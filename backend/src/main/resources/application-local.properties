# Local development profile — uses H2 in-memory DB (no PostgreSQL needed)
spring.datasource.url=jdbc:h2:mem:fucm;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# Placeholder so Spring AI context loads; override with a real key to test AI features
spring.ai.openai.api-key=${OPENAI_API_KEY:local-dev-placeholder}