spring.application.name=Backend

# Database Configuration
# DB_URL, DB_USER & DB_PASSWORD are stored in the servers (render) environment variables.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fucm}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-4o

# Tavily (used directly via REST, key injected into TavilyService)
tavily.api-key=${TAVILY_API_KEY:}

# Async thread pool
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8

# Multipart file upload limit
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Server Port (Render sets a PORT env var, but 8080 is default fallback)
server.port=${PORT:8080}
